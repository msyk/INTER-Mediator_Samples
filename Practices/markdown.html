<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1"/>
    <title>Markdown Sample - INTER-Mediator</title>
    <script src="../vendor/inter-mediator/inter-mediator/index.php"></script>
    <script>
      INTERMediatorOnPage.doAfterConstruct = function () {
        document.getElementById('container').style.display = "block";
      };
    </script>
</head>
<body>
<div id="nonsupportmessage">
    <div style="text-align:center;color:yellow;background-color:black;">
        If you see this, you must use any supported
        web browser with Javascript enabled.
    </div>
    <div style="text-align:center;color:yellow;background-color:black;">
        この表示はサポート対象外のWebブラウザーを使っているために表示されてます。
        対応ブラウザーをJavaScriptを有効にした上でお使い下さい。
    </div>
</div>
<div id="container" style="display: none">
    <div id="header">
        マークアップテキスト
    </div>
    <table class="stepbox">
        <thead>
        <tr><th>Source Text</th><th>Markup Presentation</th></tr>
        </thead>
        <tbody>
        <tr>
            <td><textarea data-im="testtable@text1" style="width:600px;height:200px;"></textarea></td>
            <td><div data-im="testtable@text1@innerHTML" data-im-format="markdown"></div></td>
        </tr>
        </tbody>
    </table>
</div>
</div>
</body>
</html>
